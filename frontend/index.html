    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
      :root {
        --color-bg: #0c0a09;     /* stone-950 */
        --color-surface: #1c1917; /* stone-900 */
        --color-border: #292524;  /* stone-800 */
        --color-fg: #f5f5f4;       /* stone-100 */
        --color-muted: #78716c;    /* stone-500 */
        --color-accent: #f59e0b;   /* amber-500 */
        --color-accent-deep: #b45309; /* amber-700 */
      }
      html, body { font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; letter-spacing: -0.011em; }
      body { background: var(--color-bg); color: var(--color-fg); }
      .font-serif-display { font-family: 'Instrument Serif', ui-serif, Georgia, serif; letter-spacing: -0.02em; }
      .font-mono, .font-mono * { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, monospace; }
      
      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: var(--color-bg); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44403c; }
      
      ::selection { background: var(--color-accent); color: #0c0a09; }
      
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fadeIn { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
      .shimmer { background: linear-gradient(90deg, transparent, rgba(245,158,11,0.08), transparent); background-size: 1000px 100%; animation: shimmer 3s infinite linear; }
      
      /* ============ LIQUID GLASS / MIRROR EFFECT ============ */
      /* Soft frosted glass surface — for any card */
      .liquid-glass {
        position: relative;
        background: linear-gradient(180deg, rgba(41,37,36,0.55) 0%, rgba(28,25,23,0.65) 100%);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(245,245,244,0.06);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.06),
          inset 0 -1px 0 rgba(0,0,0,0.4),
          0 8px 32px -8px rgba(0,0,0,0.5);
        overflow: hidden;
      }
      .liquid-glass::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(120% 60% at 50% 0%, rgba(245,158,11,0.06), transparent 60%),
          radial-gradient(60% 60% at 100% 100%, rgba(255,255,255,0.025), transparent 70%);
        pointer-events: none;
        opacity: 1;
      }

      /* Stronger glass for hero cards */
      .liquid-glass-strong {
        position: relative;
        background:
          linear-gradient(180deg, rgba(245,158,11,0.05) 0%, rgba(28,25,23,0.7) 60%),
          linear-gradient(180deg, rgba(68,64,60,0.5) 0%, rgba(28,25,23,0.85) 100%);
        backdrop-filter: blur(28px) saturate(190%);
        -webkit-backdrop-filter: blur(28px) saturate(190%);
        border: 1px solid rgba(245,158,11,0.18);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.10),
          inset 0 -1px 0 rgba(0,0,0,0.5),
          0 16px 48px -12px rgba(245,158,11,0.10),
          0 8px 24px -8px rgba(0,0,0,0.6);
        overflow: hidden;
      }
      .liquid-glass-strong::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(140% 80% at 50% -20%, rgba(245,158,11,0.18), transparent 55%),
          radial-gradient(80% 60% at 100% 120%, rgba(180,83,9,0.10), transparent 70%);
        pointer-events: none;
      }

      /* Mirror reflection — for top of hero card */
      .liquid-mirror {
        position: relative;
        background:
          linear-gradient(180deg, rgba(245,158,11,0.10) 0%, rgba(245,158,11,0.02) 25%, rgba(28,25,23,0.6) 100%),
          linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.3) 100%);
        backdrop-filter: blur(32px) saturate(200%);
        -webkit-backdrop-filter: blur(32px) saturate(200%);
        border: 1px solid rgba(245,158,11,0.22);
        box-shadow:
          inset 0 2px 0 rgba(255,255,255,0.14),
          inset 0 -1px 0 rgba(0,0,0,0.5),
          0 24px 64px -16px rgba(245,158,11,0.15),
          0 4px 16px -4px rgba(0,0,0,0.6);
        overflow: hidden;
      }
      .liquid-mirror::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 50%;
        background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
        pointer-events: none;
        transform: skewY(-2deg);
        transform-origin: top left;
      }
      .liquid-mirror::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(120% 70% at 50% -10%, rgba(245,158,11,0.22), transparent 50%),
          radial-gradient(50% 40% at 50% 100%, rgba(245,158,11,0.08), transparent 70%);
        pointer-events: none;
      }
      .liquid-mirror > * { position: relative; z-index: 1; }

      /* Liquid ripple highlight on hover (subtle) */
      .liquid-hover {
        transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s, border-color 0.3s;
      }
      .liquid-hover:hover {
        transform: translateY(-1px);
        border-color: rgba(245,158,11,0.35);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.12),
          0 20px 56px -12px rgba(245,158,11,0.18),
          0 8px 24px -6px rgba(0,0,0,0.65);
      }

      /* Slow liquid shimmer overlay */
      @keyframes liquidShimmer {
        0% { transform: translateX(-30%) translateY(-20%) rotate(0deg); }
        50% { transform: translateX(30%) translateY(20%) rotate(180deg); }
        100% { transform: translateX(-30%) translateY(-20%) rotate(360deg); }
      }
      .liquid-shimmer-bg {
        position: absolute;
        inset: -50%;
        background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(245,158,11,0.06) 90deg, transparent 180deg, rgba(255,255,255,0.03) 270deg, transparent 360deg);
        animation: liquidShimmer 14s linear infinite;
        pointer-events: none;
        filter: blur(40px);
        opacity: 0.7;
      }
    </style>
